name: CI

on:
  push:
  pull_request:

jobs:
  java-and-runtime-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check no active Python runtime files
        run: python tests/scripts/check_no_python_runtime.py

      - name: Validate system app manifests
        run: python tests/scripts/validate_all_manifests.py

      - name: Compile Java modules
        run: python tools/build_java_modules.py --clean

      - name: Package system apps
        run: python tests/scripts/check_packages.py

      - name: Build runtime image
        run: python tools/build_runtime_image.py --output build/runtime-image

      - name: Validate HIL marker parser
        run: python tests/scripts/hil_runner.py tests/fixtures/hil_boot_matrix.json
